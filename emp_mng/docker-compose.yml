services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: emp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: emp_db
      MYSQL_USER: devops
      MYSQL_PASSWORD: password123
    
    volumes:
    - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql